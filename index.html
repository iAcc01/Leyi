<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>换物 Exchange · 全页面画廊</title>
<style>
:root{--bg-page:#EFEDE7;--bg-frame:#F2F0EB;--bg-screen:#FBFAF7;--bg-card:#FFFFFF;--bg-muted:#EAE6DA;--line:rgba(0,0,0,0.08);--line-soft:rgba(0,0,0,0.06);--ink:#1A1A1A;--ink-2:#73706A;--ink-3:#A09D96;--ink-4:#9C9A93;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg-page);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased;}
body{padding:48px 24px 80px;}
.hero{max-width:1320px;margin:0 auto 40px;text-align:center;}
.hero .eyebrow{font-size:11px;color:var(--ink-3);letter-spacing:2px;text-transform:uppercase;}
.hero h1{margin-top:12px;font-size:42px;font-weight:500;letter-spacing:-1.2px;}
.hero p{margin-top:10px;font-size:14px;color:var(--ink-2);line-height:1.7;}
.hero .meta{margin-top:18px;display:inline-flex;gap:18px;font-size:11px;color:var(--ink-3);letter-spacing:0.5px;}
.hero .meta span{display:inline-flex;align-items:center;gap:6px;}
.hero .meta i{width:6px;height:6px;background:var(--ink);border-radius:50%;display:inline-block;}
.sect-title{max-width:1320px;margin:48px auto 18px;font-size:11px;color:var(--ink-3);letter-spacing:1.5px;text-transform:uppercase;padding-left:10px;border-left:2px solid var(--ink);}
.grid{max-width:1320px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,260px);gap:28px;justify-content:center;}
.frame{width:260px;background:var(--bg-frame);border-radius:40px;padding:10px;border:0.5px solid var(--line);box-shadow:0 1px 2px rgba(0,0,0,0.03),0 8px 28px rgba(0,0,0,0.04);}
.screen{width:100%;aspect-ratio:4/9;background:var(--bg-screen);border-radius:30px;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.statusbar{display:flex;justify-content:space-between;padding:14px 22px 0;font-size:11px;color:var(--ink);font-weight:500;}
.dots{display:flex;gap:3px;align-items:center;}
.dots i{width:4px;height:4px;background:var(--ink);border-radius:50%;display:block;}
.tabbar{margin-top:auto;border-top:0.5px solid var(--line);background:rgba(251,250,247,0.92);padding:10px 18px 14px;display:grid;grid-template-columns:repeat(5,1fr);align-items:center;}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--ink-4);}
.tab.act{color:var(--ink);font-weight:500;}
.ico{width:18px;height:18px;display:block;}
.fab{width:38px;height:38px;background:var(--ink);border-radius:14px;display:flex;align-items:center;justify-content:center;border:3px solid var(--bg-screen);}
.thumb{border-radius:14px;flex-shrink:0;position:relative;overflow:hidden;}
.tag{font-size:10.5px;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;}
.label{margin:0;font-size:13.5px;font-weight:500;color:var(--ink);letter-spacing:-0.1px;}
.sub{margin:3px 0 0;font-size:11.5px;color:var(--ink-2);}
.cap{font-size:10.5px;color:var(--ink-3);letter-spacing:0.5px;text-transform:uppercase;}
.row{display:flex;gap:12px;padding:14px 0;border-bottom:0.5px solid var(--line-soft);align-items:center;}
.row:last-child{border-bottom:none;}
.eyebrow-en{font-size:10.5px;color:var(--ink-3);letter-spacing:1px;}
.h1-cn{margin-top:6px;font-size:26px;font-weight:500;letter-spacing:-0.8px;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:white;border:0.5px solid var(--line);display:flex;align-items:center;justify-content:center;}
.caption{margin:14px 0 0;text-align:center;font-size:13px;font-weight:500;}
.caption-sub{margin:4px 0 0;text-align:center;font-size:11px;color:var(--ink-2);}
.divider-v{width:0.5px;background:var(--line);}
.stat-card{background:white;border:0.5px solid var(--line);border-radius:18px;padding:14px;display:flex;justify-content:space-around;}
.stat{text-align:center;}
.stat .n{margin:0;font-size:20px;font-weight:500;letter-spacing:-0.5px;}
.stat .l{margin:4px 0 0;font-size:10.5px;color:var(--ink-2);}
.metric{flex:1;background:white;border:0.5px solid var(--line);border-radius:14px;padding:10px;}
.metric .n{margin:0;font-size:16px;font-weight:500;}
.metric .l{margin:3px 0 0;font-size:10px;color:var(--ink-2);}
.medal{flex:1;background:white;border:0.5px solid var(--line);border-radius:12px;padding:10px;text-align:center;}
.medal .name{margin:4px 0 0;font-size:10px;font-weight:500;}
.menu-row{padding:12px 0;border-bottom:0.5px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;font-size:12.5px;}
.menu-row:last-child{border-bottom:none;}
.chev{color:var(--ink-3);}
.tab-text{display:flex;gap:18px;font-size:12px;border-bottom:0.5px solid var(--line-soft);padding:0 22px;}
.tab-text span{padding-bottom:10px;color:var(--ink-4);}
.tab-text span.on{color:var(--ink);font-weight:500;border-bottom:1.5px solid var(--ink);margin-bottom:-1px;}
.bigbtn{background:var(--ink);color:white;text-align:center;padding:14px;border-radius:14px;font-size:13.5px;font-weight:500;letter-spacing:0.5px;}
.bigbtn.outline{background:transparent;color:var(--ink);border:0.5px solid var(--ink);}
.progress{width:36px;height:3px;background:rgba(0,0,0,0.08);border-radius:999px;position:relative;overflow:hidden;}
.progress i{position:absolute;left:0;top:0;height:100%;background:var(--ink);border-radius:999px;}
.avatar-grad{background:linear-gradient(135deg,var(--ink),#3A3A3A);}
.avatar-amber{background:linear-gradient(135deg,#E8DCC4,#D4C4A0);color:#5A4A2A;}
.avatar-mute{background:#D8D2C2;color:#5A4A2A;}
.unread{position:absolute;right:-1px;bottom:-1px;width:13px;height:13px;background:var(--ink);border-radius:50%;border:2px solid var(--bg-screen);color:white;font-size:9px;font-weight:500;display:flex;align-items:center;justify-content:center;}
.badge{font-size:9.5px;font-weight:400;color:var(--ink);background:var(--bg-muted);padding:1px 5px;border-radius:4px;margin-left:4px;}
.badge-soft{font-size:9.5px;font-weight:400;color:var(--ink-2);margin-left:4px;}
.profile-tag{font-size:9.5px;padding:3px 8px;background:var(--bg-muted);color:var(--ink);border-radius:4px;font-weight:500;}
.right-meta{text-align:right;}
.right-meta .km{margin:0;font-size:12px;font-weight:500;}
.right-meta .walk{margin:2px 0 0;font-size:10px;color:var(--ink-3);}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px 10px;}
.back-btn{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.04);display:flex;align-items:center;justify-content:center;}
.chat-list{flex:1;overflow:hidden;padding:14px 16px;background:#F5F3EE;}
.chat-day{text-align:center;font-size:10.5px;color:var(--ink-3);margin:0 0 12px;}
.bubble{max-width:80%;padding:9px 13px;border-radius:16px;font-size:12.5px;line-height:1.5;}
.bubble.them{background:white;border-bottom-left-radius:6px;align-self:flex-start;color:var(--ink);}
.bubble.me{background:var(--ink);color:white;border-bottom-right-radius:6px;align-self:flex-end;}
.bubble-wrap{display:flex;flex-direction:column;margin-bottom:8px;}
.bubble-wrap.right{align-items:flex-end;}
.item-ref{background:white;border:0.5px solid var(--line);border-radius:12px;padding:8px;display:flex;gap:8px;align-items:center;max-width:82%;align-self:flex-start;margin-bottom:8px;}
.chat-input{background:rgba(251,250,247,0.96);border-top:0.5px solid var(--line);padding:8px 14px 14px;display:flex;align-items:center;gap:6px;}
.chat-input .ipt{flex:1;background:white;border:0.5px solid var(--line);border-radius:16px;padding:8px 12px;font-size:12px;color:var(--ink-3);}
.chat-tool{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.04);display:flex;align-items:center;justify-content:center;}
.map-full{position:absolute;inset:0;background:var(--bg-muted);}
.map-card-strip{position:absolute;bottom:18px;left:0;right:0;display:flex;gap:8px;padding:0 14px;overflow:hidden;}
.map-card{flex:0 0 180px;background:white;border:0.5px solid var(--line);border-radius:14px;padding:10px;display:flex;gap:8px;align-items:center;}
.mine-card{background:white;border:0.5px solid var(--line);border-radius:14px;padding:10px;display:flex;gap:10px;margin-bottom:8px;}
.mine-cover{width:60px;height:60px;border-radius:10px;flex-shrink:0;position:relative;overflow:hidden;}
.mine-stat{font-size:10px;color:var(--ink-3);margin-top:5px;display:flex;gap:10px;}
.mine-act{display:flex;gap:5px;margin-top:6px;}
.mine-act .btn{font-size:10px;padding:4px 10px;border-radius:999px;border:0.5px solid var(--line);background:white;}
.mine-act .btn.primary{background:var(--ink);color:white;border-color:var(--ink);}
.timeline{padding:6px 22px;position:relative;}
.timeline::before{content:'';position:absolute;left:32px;top:12px;bottom:12px;width:0.5px;background:var(--line);}
.tline-item{position:relative;padding:8px 0 8px 28px;}
.tline-dot{position:absolute;left:7px;top:14px;width:8px;height:8px;background:var(--ink);border-radius:50%;border:2px solid var(--bg-screen);box-shadow:0 0 0 1.5px var(--ink);}
.tline-date{font-size:10px;color:var(--ink-3);margin-bottom:4px;}
.tline-card{background:white;border:0.5px solid var(--line);border-radius:12px;padding:10px;display:flex;gap:10px;align-items:center;}
.wish-grid{padding:8px 22px;display:flex;gap:6px;flex-wrap:wrap;}
.wish-chip{padding:6px 12px;background:white;border:0.5px solid var(--line);border-radius:999px;font-size:11.5px;display:inline-flex;align-items:center;gap:4px;}
.wish-chip.on{background:var(--ink);color:white;border-color:var(--ink);}
.wish-chip .x{font-size:9px;opacity:0.6;}
.section-title{font-size:10.5px;color:var(--ink-3);letter-spacing:0.5px;text-transform:uppercase;padding:10px 22px 4px;}
.card-block{background:white;border:0.5px solid var(--line);border-radius:12px;margin:10px 22px;padding:12px;}
.settings-group{background:white;border:0.5px solid var(--line);border-radius:12px;margin:0 22px 12px;overflow:hidden;}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:0.5px solid var(--line-soft);font-size:12.5px;}
.set-row:last-child{border-bottom:none;}
.set-row .meta{font-size:11px;color:var(--ink-3);display:flex;align-items:center;gap:4px;}
.switch{width:32px;height:20px;background:rgba(0,0,0,0.1);border-radius:999px;position:relative;}
.switch::after{content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;background:white;border-radius:50%;box-shadow:0 1px 2px rgba(0,0,0,0.1);}
.switch.on{background:var(--ink);}
.switch.on::after{left:14px;}
.notif-item{padding:12px 22px;border-bottom:0.5px solid var(--line-soft);display:flex;gap:10px;align-items:flex-start;}
.notif-icon{width:32px;height:32px;border-radius:10px;background:var(--bg-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-logo{width:68px;height:68px;border-radius:20px;background:var(--ink);display:flex;align-items:center;justify-content:center;margin-bottom:22px;position:relative;}
.brand-logo::before{content:'';position:absolute;inset:18px;border:2px solid white;border-radius:50% 50% 8px 8px / 60% 60% 8px 8px;}
.input-field{background:white;border:0.5px solid var(--line);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.input-field .prefix{font-size:11.5px;color:var(--ink-2);padding-right:8px;border-right:0.5px solid var(--line);}
.input-field .ipt{flex:1;font-size:12.5px;color:var(--ink);}
.input-field .ipt.ph{color:var(--ink-3);}
.input-field .suffix{font-size:11px;color:var(--ink);font-weight:500;padding:3px 8px;border-radius:6px;background:rgba(0,0,0,0.04);}
.oauth-btn-s{width:36px;height:36px;border-radius:50%;background:white;border:0.5px solid var(--line);display:flex;align-items:center;justify-content:center;}
.divider-text{display:flex;align-items:center;gap:10px;margin:16px 0 10px;color:var(--ink-3);font-size:10.5px;}
.divider-text::before,.divider-text::after{content:'';flex:1;height:0.5px;background:var(--line);}
.interest-chip-s{padding:6px 12px;background:white;border:0.5px solid var(--line);border-radius:999px;font-size:11px;}
.interest-chip-s.on{background:var(--ink);color:white;border-color:var(--ink);}
.checkbox-s{width:12px;height:12px;border-radius:3px;border:1px solid var(--ink-3);flex-shrink:0;margin-top:2px;position:relative;}
.checkbox-s.on{background:var(--ink);border-color:var(--ink);}
.checkbox-s.on::after{content:'';position:absolute;left:2.5px;top:-0.5px;width:3px;height:7px;border:solid white;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);}
@media (max-width:640px){body{padding:24px 12px;}.hero h1{font-size:32px;}.grid{gap:18px;grid-template-columns:260px;}}
</style>
</head>
<body>

<header class="hero">
  <div class="eyebrow">EXCHANGE · 以物易物</div>
  <h1>换物</h1>
  <p>万物有缘，旧物新主<br/>不论价格，只论缘分</p>
  <div class="meta">
    <span><i></i>14 页面</span>
    <span><i></i>4 主 Tab</span>
    <span><i></i>10 子页</span>
    <span><i></i>iPhone 16 比例</span>
  </div>
</header>

<p class="sect-title">入门</p>
<main class="grid" id="grid-auth"></main>

<p class="sect-title">主 Tab</p>
<main class="grid" id="grid-main"></main>

<p class="sect-title">交易子页</p>
<main class="grid" id="grid-trade"></main>

<p class="sect-title">个人中心子页</p>
<main class="grid" id="grid-mine"></main>

<p class="sect-title">系统页</p>
<main class="grid" id="grid-system"></main>

<footer style="max-width:1320px;margin:60px auto 0;text-align:center;font-size:11px;color:var(--ink-3);letter-spacing:0.5px;">
  EXCHANGE · 不论价格 · 只论缘分
</footer>

<!-- 公共 tabbar SVG（提取以减少重复） -->
<template id="tpl-tabbar"></template>

<script>
const TABS = (act) => {
  const items = [
    {key:'square', svg:'<svg class="ico" viewBox="0 0 24 24"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="18" r="2.5"/></svg>', name:'广场'},
    {key:'local', svg:'<svg class="ico" viewBox="0 0 24 24"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>', name:'本地'},
    {key:'fab', name:''},
    {key:'message', svg:'<svg class="ico" viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8v.5z"/></svg>', name:'消息'},
    {key:'me', svg:'<svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>', name:'我的'},
  ];
  return '<div class="tabbar">' + items.map(t => {
    if(t.key==='fab') return '<div class="tab" style="margin-top:-6px;"><div class="fab"><svg width="14" height="14" viewBox="0 0 24 24" stroke="white" stroke-width="2.4" fill="none" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div></div>';
    const isAct = t.key===act;
    const fill = isAct ? '#1A1A1A' : 'none';
    const stroke = isAct ? 'none' : '#9C9A93';
    const cls = isAct ? 'tab act' : 'tab';
    const ic = t.svg.replace('<svg class="ico"', `<svg class="ico" fill="${fill}" stroke="${stroke}" stroke-width="1.6"`);
    let dot = '';
    if(t.key==='message' && !isAct) dot = '<div style="position:absolute;top:-2px;right:14px;width:7px;height:7px;background:var(--ink);border-radius:50%;border:1.5px solid var(--bg-screen);"></div>';
    return `<div class="${cls}" style="position:relative;">${ic}${dot}${t.name}</div>`;
  }).join('') + '</div>';
};
const STATUSBAR = '<div class="statusbar"><span>9:41</span><div class="dots"><i></i><i></i><i></i><i></i></div></div>';

// ========== 页面渲染辅助 ==========
function screen(content, caption, sub){
  return `<section><div class="frame"><div class="screen">${STATUSBAR}${content}</div></div><p class="caption">${caption}</p><p class="caption-sub">${sub}</p></section>`;
}
function navbar(title, right){
  return `<div class="navbar"><div class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"><path d="m15 6-6 6 6 6"/></svg></div><span style="font-size:13px;font-weight:500;">${title}</span>${right||'<div style="width:32px;"></div>'}</div>`;
}
const CHEV_R = '<svg class="chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg>';
const DOTS_3 = '<div class="back-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></div>';

// ========== 1. 广场 ==========
const PAGE_SQUARE = `
<div style="padding:14px 22px 12px;display:flex;justify-content:space-between;align-items:flex-end;">
  <div><p class="eyebrow-en">EXCHANGE</p><p class="h1-cn">广场</p></div>
  <div class="icon-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>
</div>
<div class="tab-text" style="padding-bottom:0;"><span class="on">推荐</span><span>书籍</span><span>数码</span><span>手作</span><span>服饰</span></div>
<div style="flex:1;padding:6px 22px;overflow:hidden;">
  <div class="row">
    <div class="thumb" style="width:56px;height:56px;background:linear-gradient(135deg,#E8DCC4,#D4C4A0);"><div style="position:absolute;left:14px;top:18px;width:28px;height:32px;background:#A88B5F;border-radius:50% 50% 8px 8px / 60% 60% 8px 8px;"></div></div>
    <div style="flex:1;min-width:0;"><p class="label">陶艺手作马克杯</p><p class="sub">想换 · 多肉 / 茶叶</p><p style="margin:6px 0 0;font-size:10px;color:var(--ink-3);">阿衡 · 2 小时前</p></div>
  </div>
  <div class="row">
    <div class="thumb" style="width:56px;height:56px;background:#1A1A1A;"><div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:28px;height:20px;background:#3A3A3A;border-radius:4px;"></div><div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:#0A0A0A;border-radius:50%;border:2px solid #2C2C2A;"></div></div>
    <div style="flex:1;min-width:0;"><p class="label">胶片相机 · 美能达</p><p class="sub">想换 · 黑胶唱片</p><p style="margin:6px 0 0;font-size:10px;color:var(--ink-3);">林樾 · 5 小时前</p></div>
  </div>
  <div class="row">
    <div class="thumb" style="width:56px;height:56px;background:#E8E2D5;"><div style="position:absolute;left:12px;top:8px;width:32px;height:40px;background:#FBFAF7;border-radius:2px 4px 4px 2px;border-left:3px solid #8A6F4A;"></div></div>
    <div style="flex:1;min-width:0;"><p class="label">绝版书《城南旧事》</p><p class="sub">想换 · 同价值文学</p><p style="margin:6px 0 0;font-size:10px;color:var(--ink-3);">山客 · 昨天</p></div>
  </div>
</div>
${TABS('square')}`;

// ========== 2. 本地 ==========
const PAGE_LOCAL = `
<div style="padding:14px 22px 10px;display:flex;justify-content:space-between;align-items:flex-end;">
  <div><p class="eyebrow-en">NEARBY · 1.5 KM</p><p class="h1-cn">本地</p></div>
  <div class="icon-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1A1A1A" stroke-width="2"><path d="M3 6h18M6 12h12M10 18h4"/></svg></div>
